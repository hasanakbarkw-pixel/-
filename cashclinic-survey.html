.progress-wrap{padding:0 1.25rem;padding-top:1.25rem}

.step-count{font-size:11px;color:#aaa;margin-top:6px;margin-bottom:0}

.content{padding:1.5rem 1.25rem}
.step{display:none}
.step.active{display:block}

.step-sub{font-size:14px;color:#888;margin-bottom:1.25rem;line-height:1.6}

.options-grid{display:grid;gap:10px}
.option-card{background:#fff;border:1.5px solid #e8e8e8;border-radius:12px;padding:0.85rem 1rem;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:border-color 0.15s,background 0.15s}
.option-card:hover{border-color:#ccc;background:#fafafa}
.option-card.selected{border-color:#1D9E75;background:#f0faf6}
.option-card.selected .opt-title{color:#0a7a5a}
.option-card.selected .opt-desc{color:#0a7a5a}
.opt-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.opt-title{font-size:14px;font-weight:600;color:#111;margin-bottom:2px}
.opt-desc{font-size:12px;color:#888;line-height:1.5}

.free-input:focus{outline:none;border-color:#1D9E75}

.btn-row{display:flex;gap:10px;margin-top:1.5rem;justify-content:flex-end}
.nav-btn{padding:9px 20px;font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid #ddd;border-radius:10px;background:#fff;color:#555;transition:background 0.15s}
.nav-btn:hover{background:#f5f5f5}
.nav-btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
.nav-btn.primary:hover{background:#0a7a5a}
.err-msg{font-size:12px;color:#c0392b;margin-top:8px;display:none}

.result-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:0.75rem}
.result-title{font-size:18px;font-weight:700;color:#111;margin-bottom:4px}
.result-sub{font-size:13px;color:#888;margin-bottom:1.25rem}

.info-card{background:#f8f8f8;border-radius:12px;overflow:hidden;margin-bottom:1rem}

.sec-text{font-size:13px;color:#333;line-height:1.7}
.steps-list{list-style:none}

.steps-list li:last-child{border-bottom:none}

  const total=TOTAL_Q;
  const pct=Math.round((currentStep/(total+1))*100);
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('stepCount').textContent=currentStep<=total?tx('stepOf').replace('{n}',currentStep).replace('{total}',total):'';

  if(currentStep>total){ renderResult(); return; }
  renderStep(currentStep-1);
}

function renderStep(qIdx){
  const q=cfg.questions[qIdx];
  let opts=q.options||[];
  if(q.dynamic){ opts=q.optsByType[answers['situation']||'startup']; }
  const isLast=currentStep===TOTAL_Q;
  const area=document.getElementById('surveyArea');

  const optsHtml=opts.map(o=>`
    <div class="option-card${answers[q.key]===o.v?' selected':''}" onclick="selectOpt('${q.key}','${o.v}',this)">
      <div class="opt-icon">${o.icon}</div>
      <div>
        <div class="opt-title">${o.titles[lang]}</div>
        ${o.descs&&o.descs[lang]?`<div class="opt-desc">${o.descs[lang]}</div>`:''}
      </div>
    </div>`).join('');

  const freeHtml=isLast?`
    <div style="margin-top:1.25rem">
      <div style="font-size:14px;font-weight:600;color:#111;margin-bottom:4px">${tx('freeLabel')}</div>
      <div style="font-size:12px;color:#aaa;margin-bottom:6px">${tx('freeSub')}</div>
      <textarea class="free-input" id="freetext" placeholder="${tx('freePh')}">${answers._free||''}</textarea>
    </div>`:'';

  const prevBtn=currentStep>1?`<button class="nav-btn" onclick="goBack()">${tx('prev')}</button>`:'';
  const nextLabel=isLast?tx('showResult'):tx('next');

  area.innerHTML=`
    <div class="step active">
      <div class="step-title">${q.titles[lang]}</div>
      <div class="step-sub">${q.subs[lang]}</div>
      <div class="options-grid">${optsHtml}</div>
      ${freeHtml}
      <div class="err-msg" id="err-msg">${tx('errSelect')}</div>
      <div class="btn-row">${prevBtn}<button class="nav-btn primary" onclick="goNext()">${nextLabel}</button></div>
    </div>`;
}

function selectOpt(key,val,el){
  answers[key]=val;
  document.querySelectorAll('.option-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  const err=document.getElementById('err-msg');
  if(err) err.style.display='none';
}

function goNext(){
  const q=cfg.questions[currentStep-1];
  const ft=document.getElementById('freetext');
  if(ft) answers._free=ft.value;
  if(!answers[q.key]){
    const err=document.getElementById('err-msg');
    if(err) err.style.display='block';
    return;
  }
  currentStep++;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  if(currentStep>1){ currentStep--; render(); window.scrollTo({top:0,behavior:'smooth'}); }
}

function renderResult(){
  const type=answers['situation']||'startup';
  const urgency=answers['urgency'];
  const budget=answers['budget'];
  const p=cfg.prices[type];
  const typeIdx={startup:0,crisis:1,growth:2}[type];
  const bc=badgeColors[type];
  const price=budget==='high'?p.high:budget==='mid'?p.mid:p.low;
  const startDate=urgency==='urgent'?p.urgentStart:urgency==='ready'?p.readyStart:p.flexStart;

  const steps=stepsByType[type][lang];
  const stepsHtml=steps.map((s,i)=>`<li><div class="snum">${i+1}</div><div>${s}</div></li>`).join('');

  const pkgName=tx('pkgNames')[typeIdx];
  const waMsg=encodeURIComponent(T[lang].waMsg[type]);
  const waUrl=`https://wa.me/${WA_NUMBER}?text=${waMsg}`;

  const freeSection=answers._free?`
    <div class="info-card-sec">
      <div class="sec-label">${tx('secGoal')}</div>
      <div style="background:#f8f8f8;border-radius:8px;padding:0.75rem;font-size:13px;color:#666;line-height:1.6;font-style:italic">"${answers._free}"</div>
    </div>`:'';

  document.getElementById('stepCount').textContent='';
  document.getElementById('surveyArea').innerHTML=`
    <div class="result-wrap">
      <div class="result-badge" style="background:${bc.bg};color:${bc.txt}">${tx('badgeLabels')[typeIdx]}</div>
      <div class="result-title">${tx('pkgNames')[typeIdx]}</div>
      <div class="result-sub">${tx('pkgSubs')[typeIdx]}</div>

      <div class="info-card">
        ${freeSection}
        <div class="info-card-sec">
          <div class="sec-label">${tx('secGoal')}</div>
          <div class="sec-text">${goals[type][lang]}</div>
        </div>
        <div class="info-card-sec">
          <div class="sec-label">${tx('secSteps')}</div>
          <ul class="steps-list">${stepsHtml}</ul>
        </div>
        <div class="info-card-sec">
          <div class="sec-label">${tx('secDel')}</div>
          <div class="sec-text">${deliverables[type][lang]}</div>
        </div>
        <div class="info-card-sec">
          <div class="sec-label">${tx('secDetails')}</div>
          <div class="price-row"><span class="price-label">${tx('lblDur')}</span><span class="price-val">${p.dur}</span></div>
          <div class="price-row"><span class="price-label">${tx('lblPrice')}</span><span class="price-val">${price}</span></div>
          <div class="price-row"><span class="price-label">${tx('lblStart')}</span><span class="price-val">${startDate}</span></div>
        </div>
      </div>

      <div class="cta-section">
        <div class="cta-title">${tx('ctaTitle')}</div>
        <div class="cta-grid">
          <a class="cta-btn cta-wa" href="${waUrl}" target="_blank">
            <span class="cta-icon">💬</span>
            <span class="cta-label">${tx('ctaWa')}</span>
          </a>
          <a class="cta-btn cta-cal" href="${CALENDLY_URL}" target="_blank">
            <span class="cta-icon">📅</span>
            <span class="cta-label">${tx('ctaCal')}</span>
          </a>
        </div>
      </div>

      <button class="restart-btn" onclick="restartSurvey()">${tx('restart')}</button>
    </div>`;
}

function restartSurvey(){
  answers={};
  currentStep=1;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
