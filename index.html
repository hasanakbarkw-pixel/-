</head>

function getQDef(key){
  if(key==='challenge') return cfg.questions.challenge[answers.situation||'startup'];
  if(key==='team'){const rev=answers.revenue||'small';return{...cfg.questions.team,options:cfg.questions.team.optsByRevenue[rev]};}
  return cfg.questions[key];
}
function renderStep(key){
  const q=getQDef(key);
  const isMulti=q.multi===true,maxSel=q.max||1;
  const selArr=isMulti?(Array.isArray(answers[key])?answers[key]:[]):(answers[key]?[answers[key]]:[]);
  const hintHtml=isMulti?`<div class="step-hint">✔ ${tx('multiHint')}</div>`:'';
  const optsHtml=q.options.map(o=>{
    const sel=selArr.includes(o.v);
    return `<div class="option-card${sel?' selected':''}" data-key="${key}" data-val="${o.v}" data-multi="${isMulti}" data-max="${maxSel}" onclick="handleSelect(this)">
      <div class="check-badge">✓</div>
      <div class="opt-icon">${o.icon}</div>
      <div><div class="opt-title">${o.titles[lang]}</div>${o.descs&&o.descs[lang]?`<div class="opt-desc">${o.descs[lang]}</div>`:''}</div>
    </div>`;
  }).join('');
  const prevBtn=currentStep>1?`<button class="nav-btn" onclick="goBack()">${tx('prev')}</button>`:'';
  document.getElementById('surveyArea').innerHTML=`
    <div class="step-title">${q.titles[lang]}</div>
    <div class="step-sub">${q.subs[lang]}</div>
    ${hintHtml}
    <div class="options-grid">${optsHtml}</div>
    <div class="err-msg" id="err-msg">${isMulti?tx('errMulti'):tx('errSelect')}</div>
    <div class="btn-row">${prevBtn}<button class="nav-btn primary" onclick="goNext()">${tx('next')}</button></div>`;
}
function handleSelect(el){
  const key=el.dataset.key,val=el.dataset.val,isMulti=el.dataset.multi==='true',maxSel=parseInt(el.dataset.max)||1;
  if(isMulti){
    let arr=Array.isArray(answers[key])?[...answers[key]]:[];
    if(arr.includes(val)){arr=arr.filter(x=>x!==val);}
    else if(arr.length<maxSel){arr.push(val);}
    else{arr.shift();arr.push(val);}
    answers[key]=arr;
    document.querySelectorAll(`.option-card[data-key="${key}"]`).forEach(c=>{
      const s=arr.includes(c.dataset.val);
      c.classList.toggle('selected',s);
    });
  }else{
    answers[key]=val;
    document.querySelectorAll(`.option-card[data-key="${key}"]`).forEach(c=>c.classList.remove('selected'));
    el.classList.add('selected');
    const err=document.getElementById('err-msg');if(err)err.style.display='none';
    setTimeout(()=>{currentStep++;render();window.scrollTo({top:0,behavior:'smooth'});},320);
  }
}

  const key=getCurrentKey(),q=getQDef(key),isMulti=q&&q.multi===true,val=answers[key];

}

      <div class="e-label">السعر (أرقام فقط)</div><input class="e-input ltr" id="ep-${k}-price" value="${p.price}">
      <div class="e-label" style="margin-top:6px">المدة</div><input class="e-input" id="ep-${k}-dur" value="${p.dur}">
      <div class="e-label" style="margin-top:6px">موعد بداية (عاجل)</div><input class="e-input" id="ep-${k}-urgentStart" value="${p.urgentStart}">
      <div class="e-label" style="margin-top:6px">موعد بداية (جاهز)</div><input class="e-input" id="ep-${k}-readyStart" value="${p.readyStart}">
    </div>`;
  });
  document.getElementById('priceEditorArea').innerHTML=html;
}
function savePriceEditor(){
  Object.keys(cfg.prices).forEach(k=>{
    const p=cfg.prices[k];
    ['price','dur','urgentStart','readyStart'].forEach(f=>{const el=document.getElementById(`ep-${k}-${f}`);if(el)p[f]=el.value;});
  });
}
function renderMsgEditor(){
  let html='';
  const labels={startup:'مشروع جديد',crisis_startup:'أزمة ناشئة',crisis_sme:'أزمة صغيرة/متوسطة',growth_startup:'نمو ناشئة',growth_sme:'نمو صغيرة/متوسطة'};
  ['ar','en'].forEach(l=>{
    html+=`<div class="e-section"><div class="e-label">رسائل واتساب — ${l==='ar'?'عربي':'English'}</div>`;
    Object.keys(cfg.waMessages[l]).forEach(k=>{
      html+=`<div style="margin-bottom:8px"><div class="e-label">${labels[k]||k}</div><textarea class="e-input${l==='en'?' ltr':''}" id="em-${l}-${k}" style="min-height:55px;resize:vertical">${cfg.waMessages[l][k]}</textarea></div>`;
    });
    html+='</div>';
  });
  document.getElementById('msgEditorArea').innerHTML=html;
}
function saveMsgEditor(){
  ['ar','en'].forEach(l=>{Object.keys(cfg.waMessages[l]).forEach(k=>{const el=document.getElementById(`em-${l}-${k}`);if(el)cfg.waMessages[l][k]=el.value;});});
}
function renderLabelsEditor(){
  document.getElementById('labelsEditorArea').innerHTML=`<div class="e-section">
    <div class="e-label">عنوان قسم التواصل</div>
    <div class="e-row">
      <input class="e-input" id="el-ctaTitle-ar" value="${cfg.labels.ctaTitle.ar}">
      <input class="e-input ltr" id="el-ctaTitle-en" value="${cfg.labels.ctaTitle.en}">
    </div>
    <div class="e-label">نص زر واتساب</div>
    <div class="e-row">
      <input class="e-input" id="el-ctaWa-ar" value="${cfg.labels.ctaWa.ar}">
      <input class="e-input ltr" id="el-ctaWa-en" value="${cfg.labels.ctaWa.en}">
    </div>
  </div>`;
}
function saveLabelsEditor(){
  cfg.labels.ctaTitle.ar=document.getElementById('el-ctaTitle-ar').value;
  cfg.labels.ctaTitle.en=document.getElementById('el-ctaTitle-en').value;
  cfg.labels.ctaWa.ar=document.getElementById('el-ctaWa-ar').value;
  cfg.labels.ctaWa.en=document.getElementById('el-ctaWa-en').value;
}

async function saveToGitHub(){
  saveQEditor();savePriceEditor();saveMsgEditor();saveLabelsEditor();
  const btn=document.getElementById('saveBtn'),status=document.getElementById('saveStatus');
  btn.disabled=true;btn.textContent='⏳ جاري الحفظ...';
  status.className='save-status loading';status.textContent='يتم رفع التعديلات...';
  try{
    const getR=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`,{headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json'}});
    if(!getR.ok) throw new Error('فشل في قراءة الملف — تحقق من الـ Token');
    const fd=await getR.json();
    const encoded=btoa(unescape(encodeURIComponent(document.documentElement.outerHTML)));
    const putR=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`,{method:'PUT',headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:'تحديث الاستبيان',content:encoded,sha:fd.sha})});
    if(!putR.ok){const e=await putR.json();throw new Error(e.message||'فشل الرفع');}
    btn.disabled=false;btn.textContent='💾 حفظ التعديلات على الموقع';
    status.className='save-status ok';status.textContent='✅ تم الحفظ! الموقع يتحدث خلال دقيقة.';
    render();
  }catch(e){
    btn.disabled=false;btn.textContent='💾 حفظ التعديلات على الموقع';
    status.className='save-status err';status.textContent='❌ خطأ: '+e.message;
  }
}
render();
</script>
</body>
</html>
