<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استشارات | Cash Clinic</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f7f9;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem}
.app{width:100%;max-width:640px}
.editor-bar{display:none}
.editor-bar-top{display:flex;justify-content:space-between;align-items:center;padding:0.75rem 1rem}
.editor-bar-top span{font-size:13px;font-weight:600;color:#aaa}
.editor-bar-top span b{color:#fff}
.edit-toggle-btn{padding:6px 14px;font-size:12px;font-weight:600;border:1.5px solid #444;border-radius:8px;background:transparent;color:#ccc;cursor:pointer}
.edit-toggle-btn:hover{background:#222;color:#fff}
.edit-toggle-btn.active{background:#1E2B7A;color:#fff;border-color:#1E2B7A}
.editor-panel{display:none;padding:0 1rem 1rem}
.editor-panel.open{display:block}
.etabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.etab{padding:5px 13px;font-size:12px;font-weight:600;border:1.5px solid #333;border-radius:8px;cursor:pointer;background:transparent;color:#888}
.etab:hover{background:#222;color:#fff}
.etab.active{background:#1E2B7A;color:#fff;border-color:#1E2B7A}
.etab-content{display:none}
.etab-content.active{display:block}
.e-section{background:#1a1a1a;border-radius:10px;padding:1rem;margin-bottom:0.75rem}
.e-label{font-size:11px;font-weight:700;color:#666;letter-spacing:0.5px;margin-bottom:6px;text-transform:uppercase}
.e-input{width:100%;padding:7px 10px;font-size:13px;font-family:inherit;border:1.5px solid #333;border-radius:8px;background:#111;color:#fff;direction:rtl}
.e-input:focus{outline:none;border-color:#1E2B7A}
.e-input.ltr{direction:ltr}
.e-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.e-row-3{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center}
.e-del{padding:6px 10px;font-size:11px;border:1.5px solid #c0392b;border-radius:6px;background:transparent;color:#c0392b;cursor:pointer}
.e-del:hover{background:#c0392b;color:#fff}
.e-add{padding:6px 12px;font-size:12px;border:1.5px solid #444;border-radius:6px;background:transparent;color:#888;cursor:pointer;margin-top:4px}
.e-add:hover{background:#222;color:#fff}
.e-select{padding:7px 10px;font-size:13px;font-family:inherit;border:1.5px solid #333;border-radius:8px;background:#111;color:#fff;width:100%;margin-bottom:0.75rem}
.e-select:focus{outline:none;border-color:#1E2B7A}
.save-btn{width:100%;padding:10px;font-size:14px;font-weight:700;background:#1E2B7A;color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:0.5rem}
.save-btn:hover{background:#15205C}
.save-btn:disabled{background:#444;color:#888;cursor:default}
.save-status{font-size:12px;text-align:center;margin-top:6px;min-height:18px}
.save-status.ok{color:#1E2B7A}
.save-status.err{color:#e74c3c}
.save-status.loading{color:#888}
.survey-card{background:#fff;border-radius:16px;box-shadow:0 2px 20px rgba(0,0,0,0.08);overflow:hidden}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:0.85rem 1.25rem;border-bottom:1px solid #f0f0f0;background:#fff}
.brand{font-size:15px;font-weight:700;color:#111}
.brand span{color:#1E2B7A}
.logo-bar{display:flex;align-items:center;justify-content:center;gap:0;flex:1}
.logo-ha{display:flex;align-items:center;gap:8px}
.logo-ha-text{display:flex;flex-direction:column;line-height:1.1}
.logo-ha-name{font-size:13px;font-weight:700;color:#1E2B7A;letter-spacing:2px;font-family:Arial,sans-serif}
.logo-divider{width:1.5px;height:44px;background:#1E2B7A;margin:0 18px;opacity:0.3}
.logo-cc{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.logo-cc-name{font-size:13px;font-weight:700;color:#1E2B7A;letter-spacing:1.5px;font-family:Arial,sans-serif}
.logo-cc-sub{font-size:9px;color:#1E2B7A;opacity:0.6;letter-spacing:2px;font-family:Arial,sans-serif;text-transform:uppercase}
.lang-toggle{display:flex;border:1.5px solid #e0e0e0;border-radius:8px;overflow:hidden}
.lang-btn{padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;border:none;color:#888}
.lang-btn.active{background:#f0f0f0;color:#111}
.progress-wrap{padding:1rem 1.25rem 0}
.progress-bar{height:4px;background:#eee;border-radius:2px}
.progress-fill{height:100%;border-radius:2px;background:#1E2B7A;transition:width 0.4s}
.step-count{font-size:11px;color:#aaa;margin-top:5px}
.content{padding:1.5rem 1.25rem}
.step-title{font-size:20px;font-weight:700;color:#111;margin-bottom:6px}
.step-sub{font-size:14px;color:#888;margin-bottom:0.5rem;line-height:1.6}
.step-hint{font-size:12px;color:#15205C;font-weight:600;margin-bottom:1rem;background:#eef0f9;padding:6px 10px;border-radius:8px;display:inline-block}
.options-grid{display:grid;gap:10px}
.option-card{background:#fff;border:1.5px solid #e8e8e8;border-radius:12px;padding:0.85rem 1rem;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:border-color 0.15s,background 0.15s;position:relative}
.option-card:hover{border-color:#ccc;background:#fafafa}
.option-card.selected{border-color:#1E2B7A;background:#eef0f9}
.option-card.selected .opt-title{color:#15205C}
.option-card.selected .opt-desc{color:#15205C}
.check-badge{display:none;position:absolute;top:8px;left:10px;width:18px;height:18px;background:#1E2B7A;border-radius:50%;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}
.option-card.selected .check-badge{display:flex}
.opt-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.opt-title{font-size:14px;font-weight:600;color:#111;margin-bottom:2px}
.opt-desc{font-size:12px;color:#888;line-height:1.5}
.free-input{width:100%;padding:0.75rem 1rem;font-size:14px;font-family:inherit;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#111;resize:vertical;min-height:90px;margin-top:0.5rem}
.free-input:focus{outline:none;border-color:#1E2B7A}
.btn-row{display:flex;gap:10px;margin-top:1.5rem;justify-content:flex-end}
.nav-btn{padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid #ddd;border-radius:10px;background:#fff;color:#555}
.nav-btn:hover{background:#f5f5f5}
.nav-btn.primary{background:#1E2B7A;color:#fff;border-color:#1E2B7A}
.nav-btn.primary:hover{background:#15205C}
.err-msg{font-size:12px;color:#c0392b;margin-top:8px;display:none}
.pkg-card{border-radius:14px;overflow:hidden;margin-bottom:1rem;border:1.5px solid #eee}
.pkg-header{background:#1E2B7A;padding:1rem 1.25rem}
.pkg-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.pkg-price{font-size:42px;font-weight:700;color:#fff;margin-top:6px;font-family:Arial,sans-serif;direction:ltr;text-align:right}
.pkg-price span{font-size:16px;font-weight:400;opacity:0.85;font-family:Arial,sans-serif}
.pkg-body{padding:1rem 1.25rem;background:#f8f8f8}
.pkg-row{display:flex;align-items:flex-start;gap:10px;padding:0.6rem 0;border-bottom:1px solid #eee;font-size:15px;color:#333}
.pkg-row:last-child{border-bottom:none}
.pkg-check{color:#1E2B7A;font-size:14px;font-weight:700;flex-shrink:0;margin-top:1px}
.result-wrap{padding:1.25rem}
.result-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:0.75rem}
.res-title{font-size:18px;font-weight:700;color:#111;margin-bottom:1.25rem}
.info-card{background:#f8f8f8;border-radius:12px;overflow:hidden;margin-bottom:1rem}
.info-sec{padding:0.9rem 1rem;border-bottom:1px solid #efefef}
.info-sec:last-child{border-bottom:none}
.sec-label{font-size:10px;font-weight:700;color:#aaa;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:0.5rem}
.sec-text{font-size:13px;color:#333;line-height:1.7}
.price-row{display:flex;justify-content:space-between;padding:0.45rem 0;border-bottom:1px solid #eee;font-size:13px}
.price-row:last-child{border-bottom:none}
.price-label{color:#888}
.price-val{font-weight:700;color:#111}
.problems-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.problem-tag{background:#fef0f0;color:#c0392b;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.cta-section{margin-top:1.25rem}
.cta-title{font-size:14px;font-weight:700;color:#111;margin-bottom:0.75rem;text-align:center}
.cta-btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;padding:1.1rem;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;border:none;background:#25D366;color:#fff;width:100%}
.cta-btn-wa:hover{opacity:0.9}
.restart-btn{width:100%;margin-top:0.75rem;padding:8px;font-size:13px;cursor:pointer;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#888}
.restart-btn:hover{background:#f5f5f5}
@media(max-width:480px){.btn-row{flex-direction:column-reverse}.nav-btn{width:100%;text-align:center}}
.site-footer{margin-top:1rem;padding:1rem 1.25rem;text-align:center;border-top:1px solid #f0f0f0}
.footer-inner{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.footer-item{display:flex;align-items:center;gap:6px;font-size:13px;color:#888;text-decoration:none}
.footer-item:hover{color:#1E2B7A}
.footer-item span{font-size:16px}
.footer-divider{color:#ddd;font-size:12px}
</style>
</head>
<body>
<div class="app">
<div class="editor-bar">
  <div class="editor-bar-top">
    <span><b>لوحة التعديل</b> — Cash Clinic Survey</span>
    <button class="edit-toggle-btn" id="editToggleBtn" onclick="toggleEditor()">✏️ تعديل</button>
  </div>
  <div class="editor-panel" id="editorPanel">
    <div class="etabs">
      <button class="etab active" onclick="switchETab('questions')">الأسئلة</button>
      <button class="etab" onclick="switchETab('prices')">الأسعار</button>
      <button class="etab" onclick="switchETab('messages')">رسائل واتساب</button>
      <button class="etab" onclick="switchETab('labels')">النصوص العامة</button>
    </div>
    <div class="etab-content active" id="etab-questions">
      <div class="e-section">
        <div class="e-label">اختر السؤال</div>
        <select class="e-select" id="qSelect" onchange="loadQEditor()"></select>
        <div id="qEditorArea"></div>
      </div>
    </div>
    <div class="etab-content" id="etab-prices"><div id="priceEditorArea"></div></div>
    <div class="etab-content" id="etab-messages"><div id="msgEditorArea"></div></div>
    <div class="etab-content" id="etab-labels"><div id="labelsEditorArea"></div></div>
    <button class="save-btn" id="saveBtn" onclick="saveToGitHub()">💾 حفظ التعديلات على الموقع</button>
    <div class="save-status" id="saveStatus"></div>
  </div>
</div>

function render(){

function getQDef(key){
  if(key==='challenge') return cfg.questions.challenge[answers.situation||'startup'];
  if(key==='team'){const rev=answers.revenue||'small';return{...cfg.questions.team,options:cfg.questions.team.optsByRevenue[rev]};}
  return cfg.questions[key];
}
function renderStep(key){
  const q=getQDef(key);
  const isMulti=q.multi===true,maxSel=q.max||1;
  const selArr=isMulti?(Array.isArray(answers[key])?answers[key]:[]):(answers[key]?[answers[key]]:[]);
  const hintHtml=isMulti?`<div class="step-hint">✔ ${tx('multiHint')}</div>`:'';
  const optsHtml=q.options.map(o=>{
    const sel=selArr.includes(o.v);
    return `<div class="option-card${sel?' selected':''}" data-key="${key}" data-val="${o.v}" data-multi="${isMulti}" data-max="${maxSel}" onclick="handleSelect(this)">
      <div class="check-badge">✓</div>
      <div class="opt-icon">${o.icon}</div>
      <div><div class="opt-title">${o.titles[lang]}</div>${o.descs&&o.descs[lang]?`<div class="opt-desc">${o.descs[lang]}</div>`:''}</div>
    </div>`;
  }).join('');
  const prevBtn=currentStep>1?`<button class="nav-btn" onclick="goBack()">${tx('prev')}</button>`:'';
  document.getElementById('surveyArea').innerHTML=`
    <div class="step-title">${q.titles[lang]}</div>
    <div class="step-sub">${q.subs[lang]}</div>
    ${hintHtml}
    <div class="options-grid">${optsHtml}</div>
    <div class="err-msg" id="err-msg">${isMulti?tx('errMulti'):tx('errSelect')}</div>
    <div class="btn-row">${prevBtn}<button class="nav-btn primary" onclick="goNext()">${tx('next')}</button></div>`;
}
function handleSelect(el){
  const key=el.dataset.key,val=el.dataset.val,isMulti=el.dataset.multi==='true',maxSel=parseInt(el.dataset.max)||1;
  if(isMulti){
    let arr=Array.isArray(answers[key])?[...answers[key]]:[];
    if(arr.includes(val)){arr=arr.filter(x=>x!==val);}
    else if(arr.length<maxSel){arr.push(val);}
    else{arr.shift();arr.push(val);}
    answers[key]=arr;
    document.querySelectorAll(`.option-card[data-key="${key}"]`).forEach(c=>{
      const s=arr.includes(c.dataset.val);
      c.classList.toggle('selected',s);
    });
  }else{
    answers[key]=val;
    document.querySelectorAll(`.option-card[data-key="${key}"]`).forEach(c=>c.classList.remove('selected'));
    el.classList.add('selected');
    const err=document.getElementById('err-msg');if(err)err.style.display='none';
    setTimeout(()=>{currentStep++;render();window.scrollTo({top:0,behavior:'smooth'});},320);
  }
}

}

    html+=`<div class="e-section"><div class="e-label">رسائل واتساب — ${l==='ar'?'عربي':'English'}</div>`;
    Object.keys(cfg.waMessages[l]).forEach(k=>{
      html+=`<div style="margin-bottom:8px"><div class="e-label">${labels[k]||k}</div><textarea class="e-input${l==='en'?' ltr':''}" id="em-${l}-${k}" style="min-height:55px;resize:vertical">${cfg.waMessages[l][k]}</textarea></div>`;
    });
    html+='</div>';
  });
  document.getElementById('msgEditorArea').innerHTML=html;
}
function saveMsgEditor(){
  ['ar','en'].forEach(l=>{Object.keys(cfg.waMessages[l]).forEach(k=>{const el=document.getElementById(`em-${l}-${k}`);if(el)cfg.waMessages[l][k]=el.value;});});
}
function renderLabelsEditor(){
  document.getElementById('labelsEditorArea').innerHTML=`<div class="e-section">
    <div class="e-label">عنوان قسم التواصل</div>
    <div class="e-row">
      <input class="e-input" id="el-ctaTitle-ar" value="${cfg.labels.ctaTitle.ar}">
      <input class="e-input ltr" id="el-ctaTitle-en" value="${cfg.labels.ctaTitle.en}">
    </div>
    <div class="e-label">نص زر واتساب</div>
    <div class="e-row">
      <input class="e-input" id="el-ctaWa-ar" value="${cfg.labels.ctaWa.ar}">
      <input class="e-input ltr" id="el-ctaWa-en" value="${cfg.labels.ctaWa.en}">
    </div>
  </div>`;
}
function saveLabelsEditor(){
  cfg.labels.ctaTitle.ar=document.getElementById('el-ctaTitle-ar').value;
  cfg.labels.ctaTitle.en=document.getElementById('el-ctaTitle-en').value;
  cfg.labels.ctaWa.ar=document.getElementById('el-ctaWa-ar').value;
  cfg.labels.ctaWa.en=document.getElementById('el-ctaWa-en').value;
}

async function saveToGitHub(){
  saveQEditor();savePriceEditor();saveMsgEditor();saveLabelsEditor();
  const btn=document.getElementById('saveBtn'),status=document.getElementById('saveStatus');
  btn.disabled=true;btn.textContent='⏳ جاري الحفظ...';
  status.className='save-status loading';status.textContent='يتم رفع التعديلات...';
  try{
    const getR=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`,{headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json'}});
    if(!getR.ok) throw new Error('فشل في قراءة الملف — تحقق من الـ Token');
    const fd=await getR.json();
    const encoded=btoa(unescape(encodeURIComponent(document.documentElement.outerHTML)));
    const putR=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`,{method:'PUT',headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:'تحديث الاستبيان',content:encoded,sha:fd.sha})});
    if(!putR.ok){const e=await putR.json();throw new Error(e.message||'فشل الرفع');}
    btn.disabled=false;btn.textContent='💾 حفظ التعديلات على الموقع';
    status.className='save-status ok';status.textContent='✅ تم الحفظ! الموقع يتحدث خلال دقيقة.';
    render();
  }catch(e){
    btn.disabled=false;btn.textContent='💾 حفظ التعديلات على الموقع';
    status.className='save-status err';status.textContent='❌ خطأ: '+e.message;
  }
}
render();
</script>
