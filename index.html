  crisis:{ar:['جلسة Business Audit (90 دقيقة) — تشخيص الوضع الحالي','تقرير Root Cause Analysis — المشكلة الحقيقية وليست الأعراض','جلسة Triage Plan (60 دقيقة) — ماذا تفعل الآن وماذا تؤجل','وثيقة خطة الإنقاذ — قصير ومتوسط وطويل المدى','جلسة متابعة بعد 30 يوم — التحقق من التنفيذ'],en:['Business Audit Session (90 min) — Full diagnosis','Root Cause Analysis Report — Real problem, not symptoms','Triage Plan Session (60 min) — What to act on now vs. later','Rescue Plan Document — Short, mid, and long-term','30-Day Follow-up Session — Verify and adjust']},
  growth:{ar:['جلسة Performance Snapshot (60 دقيقة) — وين أنت الحين','تقرير Gap Analysis — ما الذي يمنعك من الوصول لهدفك؟','جلسة Growth Strategy (90 دقيقة) — استراتيجية النمو','وثيقة Execution Plan — الخطوات التفصيلية والجدول الزمني','تحويل للموردين والشبكة المناسبة'],en:['Performance Snapshot Session (60 min) — Where you are and where you want to be','Gap Analysis Report — What is blocking you?','Growth Strategy Session (90 min) — Realistic priorities','Execution Plan Document — Detailed steps and timeline','Referral to the right vendors and network']},
};
const deliverables={startup:{ar:'تقرير Validation + وثيقة Action Plan + قائمة الموردين',en:'Validation Report + Action Plan + Vendor List'},crisis:{ar:'تقرير Audit + خطة الإنقاذ + جلسة المتابعة',en:'Audit Report + Rescue Plan + Follow-up Session'},growth:{ar:'تقرير Gap Analysis + Execution Plan + شبكة الموردين',en:'Gap Analysis Report + Execution Plan + Vendor Network'}};
const goals={startup:{ar:'تأسيس مشروع قابل للربح بخطة واقعية وشبكة موردين موثوقة',en:'Launch a profitable business with a realistic plan and trusted vendor network'},crisis:{ar:'إيقاف النزيف، تحديد جذر المشكلة، ورسم خارطة الطريق للخروج',en:'Stop the bleeding, identify root cause, and map a clear exit from crisis'},growth:{ar:'رفع الإيرادات أو تقليل الهدر أو فتح أسواق جديدة بخطة مستدامة',en:'Increase revenue, reduce waste, or expand to new markets sustainably'}};
const badgeColors={startup:{bg:'#f0faf6',txt:'#0a7a5a'},crisis:{bg:'#fef0f0',txt:'#c0392b'},growth:{bg:'#edf4ff',txt:'#1a56db'}};

const TT={
  ar:{stepOf:'السؤال {n} من {total}',next:'التالي →',prev:'→ رجوع',showResult:'عرض نتيجتك ←',restart:'← ابدأ من جديد',errSelect:'الرجاء اختيار إجابة',freeLabel:'بكلمتين — شنو أكبر هدف تبيه من الاستشارة؟',freeSub:'(اختياري)',freePh:'مثال: أبي أعرف من وين أبدأ وأتجنب الأخطاء المكلفة...',resultLabel:'نتيجة التصنيف',resultTitle:'تقرير الاستشارة المقترحة',secGoal:'الهدف الرئيسي',secSteps:'خطوات البرنامج',secDel:'المخرجات',secDetails:'التفاصيل',lblDur:'المدة',lblPrice:'نطاق السعر',lblStart:'موعد البداية',badgeLabels:['فئة: بداية مشروع','فئة: إدارة أزمة','فئة: نمو وتوسع']},
  en:{stepOf:'Question {n} of {total}',next:'Next →',prev:'← Back',showResult:'Show My Result →',restart:'← Start Over',errSelect:'Please select an answer',freeLabel:'In your words — what is the #1 thing you want to achieve?',freeSub:'(optional)',freePh:'e.g. I want to know where to start and avoid costly mistakes...',resultLabel:'Classification Result',resultTitle:'Recommended Consultation Report',secGoal:'Main Goal',secSteps:'Program Steps',secDel:'Deliverables',secDetails:'Details',lblDur:'Duration',lblPrice:'Price Range',lblStart:'Start Date',badgeLabels:['Category: New Business','Category: Crisis','Category: Growth']},
};
function tx(k){return TT[lang][k]||k;}

/* ---- SURVEY ---- */
function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===(l==='ar'?'عربي':'English')));
  render();
}
function render(){
  const total=cfg.questions.length;
  const pct=Math.round((currentStep/(total+1))*100);
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('stepCount').textContent=currentStep<=total?tx('stepOf').replace('{n}',currentStep).replace('{total}',total):'';
  if(currentStep>total){renderResult();return;}
  renderStep(currentStep-1);
}
function renderStep(qIdx){
  const q=cfg.questions[qIdx];
  let opts=q.options||[];
  if(q.dynamic) opts=q.optsByType[answers['situation']||'startup'];
  const isLast=currentStep===cfg.questions.length;
  const optsHtml=opts.map(o=>`<div class="option-card${answers[q.key]===o.v?' selected':''}" onclick="selectOpt('${q.key}','${o.v}',this)"><div class="opt-icon">${o.icon}</div><div><div class="opt-title">${o.titles[lang]}</div>${o.descs&&o.descs[lang]?`<div class="opt-desc">${o.descs[lang]}</div>`:''}</div></div>`).join('');
  const freeHtml=isLast?`<div style="margin-top:1.25rem"><div style="font-size:14px;font-weight:600;color:#111;margin-bottom:4px">${tx('freeLabel')}</div><div style="font-size:12px;color:#aaa;margin-bottom:6px">${tx('freeSub')}</div><textarea class="free-input" id="freetext" placeholder="${tx('freePh')}">${answers._free||''}</textarea></div>`:'';
  const prevBtn=currentStep>1?`<button class="nav-btn" onclick="goBack()">${tx('prev')}</button>`:'';
  document.getElementById('surveyArea').innerHTML=`<div class="step active"><div class="step-title">${q.titles[lang]}</div><div class="step-sub">${q.subs[lang]}</div><div class="options-grid">${optsHtml}</div>${freeHtml}<div class="err-msg" id="err-msg">${tx('errSelect')}</div><div class="btn-row">${prevBtn}<button class="nav-btn primary" onclick="goNext()">${isLast?tx('showResult'):tx('next')}</button></div></div>`;
}
function selectOpt(key,val,el){
  answers[key]=val;
  document.querySelectorAll('.option-card').forEach(c=>{c.classList.remove('selected');});
  el.classList.add('selected');
  const err=document.getElementById('err-msg');
  if(err) err.style.display='none';
}
function goNext(){
  const q=cfg.questions[currentStep-1];
  const ft=document.getElementById('freetext');
  if(ft) answers._free=ft.value;
  if(!answers[q.key]){const err=document.getElementById('err-msg');if(err)err.style.display='block';return;}
  currentStep++;render();window.scrollTo({top:0,behavior:'smooth'});
}
function goBack(){if(currentStep>1){currentStep--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function renderResult(){
  const type=answers['situation']||'startup';
  const urgency=answers['urgency'];
  const budget=answers['budget'];
  const p=cfg.prices[type];
  const typeIdx={startup:0,crisis:1,growth:2}[type];
  const bc=badgeColors[type];
  const price=budget==='high'?p.high:budget==='mid'?p.mid:p.low;
  const startDate=urgency==='urgent'?p.urgentStart:urgency==='ready'?p.readyStart:p.flexStart;
  const steps=stepsByType[type][lang];
  const stepsHtml=steps.map((s,i)=>`<li><div class="snum">${i+1}</div><div>${s}</div></li>`).join('');
  const waMsg=encodeURIComponent(cfg.waMessages[lang][type]);
  const waUrl=`https://wa.me/${WA_NUMBER}?text=${waMsg}`;
  const freeSection=answers._free?`<div class="info-sec"><div class="sec-label">هدفك</div><div style="background:#f0f0f0;border-radius:8px;padding:0.75rem;font-size:13px;color:#666;font-style:italic">"${answers._free}"</div></div>`:'';
  const pkgNames=cfg.labels.pkgNames[lang];
  const pkgSubs=cfg.labels.pkgSubs[lang];
  document.getElementById('stepCount').textContent='';
  document.getElementById('surveyArea').innerHTML=`<div class="result-wrap"><div class="result-badge" style="background:${bc.bg};color:${bc.txt}">${tx('badgeLabels')[typeIdx]}</div><div class="res-title">${pkgNames[typeIdx]}</div><div class="res-sub">${pkgSubs[typeIdx]}</div><div class="info-card">${freeSection}<div class="info-sec"><div class="sec-label">${tx('secGoal')}</div><div class="sec-text">${goals[type][lang]}</div></div><div class="info-sec"><div class="sec-label">${tx('secSteps')}</div><ul class="steps-list">${stepsHtml}</ul></div><div class="info-sec"><div class="sec-label">${tx('secDel')}</div><div class="sec-text">${deliverables[type][lang]}</div></div><div class="info-sec"><div class="sec-label">${tx('secDetails')}</div><div class="price-row"><span class="price-label">${tx('lblDur')}</span><span class="price-val">${p.dur}</span></div><div class="price-row"><span class="price-label">${tx('lblPrice')}</span><span class="price-val">${price}</span></div><div class="price-row"><span class="price-label">${tx('lblStart')}</span><span class="price-val">${startDate}</span></div></div></div><div class="cta-section"><div class="cta-title">${cfg.labels.ctaTitle[lang]}</div><div class="cta-grid"><a class="cta-btn cta-wa" href="${waUrl}" target="_blank"><span class="cta-icon">💬</span><span>${cfg.labels.ctaWa[lang]}</span></a><a class="cta-btn cta-cal" href="${CALENDLY_URL}" target="_blank"><span class="cta-icon">📅</span><span>${cfg.labels.ctaCal[lang]}</span></a></div></div><button class="restart-btn" onclick="restartSurvey()">${tx('restart')}</button></div>`;
}
function restartSurvey(){answers={};currentStep=1;render();window.scrollTo({top:0,behavior:'smooth'});}

/* ---- EDITOR ---- */
function toggleEditor(){
  editorOpen=!editorOpen;
  document.getElementById('editorPanel').classList.toggle('open',editorOpen);
  const btn=document.getElementById('editToggleBtn');
  btn.classList.toggle('active',editorOpen);
  btn.textContent=editorOpen?'✕ إغلاق':'✏️ تعديل';
  if(editorOpen) renderEditorTabs();
}
function switchETab(tab){
  activeETab=tab;
  document.querySelectorAll('.etab').forEach((b,i)=>b.classList.toggle('active',['questions','prices','messages','labels'][i]===tab));
  document.querySelectorAll('.etab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('etab-'+tab).classList.add('active');
}
function renderEditorTabs(){
  renderQSelector();
  renderPriceEditor();
  renderMsgEditor();
  renderLabelsEditor();
}

function renderQSelector(){
  const sel=document.getElementById('qSelect');
  sel.innerHTML=cfg.questions.map((q,i)=>`<option value="${i}">${i+1}. ${q.titles['ar']}</option>`).join('');
  loadQEditor();
}
function loadQEditor(){
  const idx=parseInt(document.getElementById('qSelect').value)||0;
  const q=cfg.questions[idx];
  let html=`
    <div class="e-label" style="margin-top:0.75rem">عنوان السؤال</div>
    <div class="e-row">
      <div><div class="e-label">عربي</div><input class="e-input" id="eq-title-ar" value="${q.titles.ar}"></div>
      <div><div class="e-label">English</div><input class="e-input ltr" id="eq-title-en" value="${q.titles.en}"></div>
    </div>
    <div class="e-label">النص التوضيحي</div>
    <div class="e-row">
      <div><input class="e-input" id="eq-sub-ar" value="${q.subs.ar}"></div>
      <div><input class="e-input ltr" id="eq-sub-en" value="${q.subs.en}"></div>
    </div>
    <div class="e-label" style="margin-top:0.5rem">الخيارات</div>`;
  const opts=q.dynamic?q.optsByType.startup:(q.options||[]);
  opts.forEach((o,oi)=>{
    html+=`<div class="e-row-3">
      <input class="e-input" id="eo-ar-${oi}" placeholder="عربي" value="${o.titles.ar}">
      <input class="e-input ltr" id="eo-en-${oi}" placeholder="English" value="${o.titles.en}">
      <button class="e-del" onclick="deleteOpt(${idx},${oi})">✕</button>
    </div>`;
  });
  html+=`<button class="e-add" onclick="addOpt(${idx})">+ إضافة خيار</button>`;
  document.getElementById('qEditorArea').innerHTML=html;
}
function saveQEditor(){
  const idx=parseInt(document.getElementById('qSelect').value)||0;
  const q=cfg.questions[idx];
  q.titles.ar=document.getElementById('eq-title-ar').value;
  q.titles.en=document.getElementById('eq-title-en').value;
  q.subs.ar=document.getElementById('eq-sub-ar').value;
  q.subs.en=document.getElementById('eq-sub-en').value;
  const opts=q.dynamic?q.optsByType.startup:(q.options||[]);
  opts.forEach((o,oi)=>{
    const arEl=document.getElementById(`eo-ar-${oi}`);
    const enEl=document.getElementById(`eo-en-${oi}`);
    if(arEl) o.titles.ar=arEl.value;
    if(enEl) o.titles.en=enEl.value;
  });
}
function addOpt(qIdx){
  const q=cfg.questions[qIdx];
  const newO={v:'opt_'+Date.now(),icon:'➕',titles:{ar:'خيار جديد',en:'New Option'},descs:{ar:'',en:''}};
  if(q.dynamic){['startup','crisis','growth'].forEach(k=>q.optsByType[k].push({...newO}));}
  else{q.options.push(newO);}
  loadQEditor();
}
function deleteOpt(qIdx,oIdx){
  const q=cfg.questions[qIdx];
  if(q.dynamic){['startup','crisis','growth'].forEach(k=>{if(q.optsByType[k].length>1)q.optsByType[k].splice(oIdx,1);});}
  else{if(q.options.length>1)q.options.splice(oIdx,1);}
  loadQEditor();
}

function renderPriceEditor(){
  const types=['startup','crisis','growth'];
  const names=['باقة المؤسس الذكي','باقة إنقاذ الشركة','باقة النمو الذكي'];
  const fields=[['low','السعر - ميزانية منخفضة'],['mid','السعر - ميزانية متوسطة'],['high','السعر - ميزانية عالية'],['dur','مدة البرنامج'],['urgentStart','موعد البداية (عاجل)'],['readyStart','موعد البداية (جاهز)'],['flexStart','موعد البداية (مرن)']];
  let html='';
  types.forEach((type,ti)=>{
    html+=`<div class="e-section"><div class="e-label">${names[ti]}</div>`;
    fields.forEach(([key,label])=>{
      html+=`<div style="margin-bottom:6px"><div class="e-label">${label}</div><input class="e-input" id="ep-${type}-${key}" value="${cfg.prices[type][key]}"></div>`;
    });
    html+='</div>';
  });
  document.getElementById('priceEditorArea').innerHTML=html;
}
function savePriceEditor(){
  ['startup','crisis','growth'].forEach(type=>{
    ['low','mid','high','dur','urgentStart','readyStart','flexStart'].forEach(key=>{
      const el=document.getElementById(`ep-${type}-${key}`);
      if(el) cfg.prices[type][key]=el.value;
    });
  });
}

function renderMsgEditor(){
  let html='<div class="e-section"><div class="e-label">رسائل واتساب — عربي</div>';
  ['startup','crisis','growth'].forEach((type,i)=>{
    const names=['باقة المؤسس الذكي','أزمة الشركة','النمو والتوسع'];
    html+=`<div style="margin-bottom:8px"><div class="e-label">${names[i]}</div><textarea class="e-input" id="em-ar-${type}" style="min-height:60px;resize:vertical">${cfg.waMessages.ar[type]}</textarea></div>`;
  });
  html+='</div><div class="e-section"><div class="e-label">WhatsApp Messages — English</div>';
  ['startup','crisis','growth'].forEach((type,i)=>{
    const names=['Startup Package','Crisis Package','Growth Package'];
    html+=`<div style="margin-bottom:8px"><div class="e-label">${names[i]}</div><textarea class="e-input ltr" id="em-en-${type}" style="min-height:60px;resize:vertical">${cfg.waMessages.en[type]}</textarea></div>`;
  });
  html+='</div>';
  document.getElementById('msgEditorArea').innerHTML=html;
}
function saveMsgEditor(){
  ['startup','crisis','growth'].forEach(type=>{
    const arEl=document.getElementById(`em-ar-${type}`);
    const enEl=document.getElementById(`em-en-${type}`);
    if(arEl) cfg.waMessages.ar[type]=arEl.value;
    if(enEl) cfg.waMessages.en[type]=enEl.value;
  });
}

function renderLabelsEditor(){
  let html=`<div class="e-section">
    <div class="e-label">عنوان قسم التواصل</div>
    <div class="e-row">
      <div><div class="e-label">عربي</div><input class="e-input" id="el-ctaTitle-ar" value="${cfg.labels.ctaTitle.ar}"></div>
      <div><div class="e-label">English</div><input class="e-input ltr" id="el-ctaTitle-en" value="${cfg.labels.ctaTitle.en}"></div>
    </div>
    <div class="e-label">زر واتساب</div>
    <div class="e-row">
      <input class="e-input" id="el-ctaWa-ar" value="${cfg.labels.ctaWa.ar}">
      <input class="e-input ltr" id="el-ctaWa-en" value="${cfg.labels.ctaWa.en}">
    </div>
    <div class="e-label">زر Calendly</div>
    <div class="e-row">
      <input class="e-input" id="el-ctaCal-ar" value="${cfg.labels.ctaCal.ar}">
      <input class="e-input ltr" id="el-ctaCal-en" value="${cfg.labels.ctaCal.en}">
    </div>
  </div>`;
  document.getElementById('labelsEditorArea').innerHTML=html;
}
function saveLabelsEditor(){
  cfg.labels.ctaTitle.ar=document.getElementById('el-ctaTitle-ar').value;
  cfg.labels.ctaTitle.en=document.getElementById('el-ctaTitle-en').value;
  cfg.labels.ctaWa.ar=document.getElementById('el-ctaWa-ar').value;
  cfg.labels.ctaWa.en=document.getElementById('el-ctaWa-en').value;
  cfg.labels.ctaCal.ar=document.getElementById('el-ctaCal-ar').value;
  cfg.labels.ctaCal.en=document.getElementById('el-ctaCal-en').value;
}

async function saveToGitHub(){
  saveQEditor();
  savePriceEditor();
  saveMsgEditor();
  saveLabelsEditor();

  const btn=document.getElementById('saveBtn');
  const status=document.getElementById('saveStatus');
  btn.disabled=true;
  btn.textContent='⏳ جاري الحفظ...';
  status.className='save-status loading';
  status.textContent='يتم رفع التعديلات على الموقع...';

  try{
    const getResp=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`,{headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json'}});
    if(!getResp.ok) throw new Error('فشل في قراءة الملف');
    const fileData=await getResp.json();
    const sha=fileData.sha;

    const currentHTML=document.documentElement.outerHTML;
    const encoded=btoa(unescape(encodeURIComponent(currentHTML)));

    const putResp=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`,{
      method:'PUT',
      headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'تحديث الاستبيان',content:encoded,sha:sha})
    });

    if(!putResp.ok){const err=await putResp.json();throw new Error(err.message||'فشل الرفع');}

    btn.disabled=false;
    btn.textContent='💾 حفظ التعديلات على الموقع';
    status.className='save-status ok';
    status.textContent='✅ تم الحفظ بنجاح! سيتحدث الموقع خلال دقيقة.';
    render();
  }catch(e){
    btn.disabled=false;
    btn.textContent='💾 حفظ التعديلات على الموقع';
    status.className='save-status err';
    status.textContent='❌ خطأ: '+e.message;
  }
}

render();
</script>
